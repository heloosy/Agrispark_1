<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detailed Farming Manual - Smart Agri AI</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --header-bg: #065f46;
      --header-text: #ffffff;
      --accent: #10b981;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'IBM Plex Sans', sans-serif;
      background: #f3f4f6;
      color: var(--text);
      line-height: 1.6;
    }
    .page-container {
      max-width: 850px;
      margin: 2rem auto;
      background: var(--bg);
      padding: 3rem;
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 2rem 3rem;
      margin: -3rem -3rem 2rem -3rem;
      border-radius: 0.5rem 0.5rem 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    .meta-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #e5e7eb;
    }
    .meta-item {
      font-size: 0.9rem;
    }
    .meta-item strong {
      color: var(--header-bg);
    }
    .content h2 {
      border-left: 5px solid var(--accent);
      padding-left: 1rem;
      margin-top: 2rem;
      color: var(--header-bg);
      font-size: 1.25rem;
    }
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }
    .content th, .content td {
      border: 1px solid #e5e7eb;
      padding: 0.75rem;
      text-align: left;
    }
    .content th {
      background: #f9fafb;
    }
    .print-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--accent);
      color: white;
      padding: 1rem 2rem;
      border-radius: 2rem;
      border: none;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .print-btn:hover {
      transform: scale(1.05);
    }
    @media print {
      .print-btn { display: none; }
      body { background: white; }
      .page-container {
        margin: 0;
        box-shadow: none;
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="header">
      <h1>Smart Agri AI | Personalized Report</h1>
      <div style="font-size: 0.8rem; text-align: right;">Official Agricultural Advisory</div>
    </div>

    <div class="meta-info">
      <div class="meta-item"><strong>Report ID:</strong> <span id="report-id">AGRI-EXT-2026</span></div>
      <div class="meta-item"><strong>Date:</strong> <span id="current-date"></span></div>
      <div class="meta-item"><strong>Farmer:</strong> <span id="farmer-name"></span></div>
      <div class="meta-item"><strong>Location:</strong> <span id="farmer-location"></span></div>
      <div class="meta-item"><strong>Target Crop:</strong> <span id="farmer-target-crop" style="color:var(--accent); font-weight:bold;"></span></div>
      <div class="meta-item"><strong>Past Crop:</strong> <span id="farmer-past-crop"></span></div>
      <div class="meta-item"><strong>Soil Type:</strong> <span id="farmer-soil"></span></div>
      <div class="meta-item"><strong>Terrain:</strong> <span id="farmer-terrain"></span></div>
      <div class="meta-item"><strong>Current Stage:</strong> <span id="farmer-stage"></span></div>
    </div>

    <div id="loading" style="text-align:center; padding: 2rem;">
      <p>Consulting Ph.D. Database & Generating Your 30-Day Plan... Please wait.</p>
    </div>

    <div id="content" class="content"></div>
  </div>

  <button class="print-btn" onclick="window.print()">
    📥 Download as Official PDF
  </button>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('farmer-name').textContent = params.get('name') || 'Valued Farmer';
    document.getElementById('farmer-location').textContent = params.get('location') || 'Global Context';
    document.getElementById('farmer-target-crop').textContent = params.get('targetCrop') || 'Diversified';
    document.getElementById('farmer-past-crop').textContent = params.get('pastCrop') || 'None Recorded';
    document.getElementById('farmer-soil').textContent = params.get('soilType') || 'Unknown Texture';
    document.getElementById('farmer-terrain').textContent = params.get('terrainType') || 'Flat/Unknown';
    document.getElementById('farmer-stage').textContent = params.get('stage') || 'Discovery Phase';
    document.getElementById('current-date').textContent = new Date().toLocaleDateString();

    // Fetch the detailed plan content from the server using the FULL 7-POINT PROFILE
    async function loadPlan() {
      try {
        const name = params.get('name');
        const loc = params.get('location');
        const target = params.get('targetCrop');
        const past = params.get('pastCrop');
        const soil = params.get('soilType');
        const terrain = params.get('terrainType');
        const stage = params.get('stage');

        const query = `name=${encodeURIComponent(name)}&location=${encodeURIComponent(loc)}&targetCrop=${encodeURIComponent(target)}&pastCrop=${encodeURIComponent(past)}&soilType=${encodeURIComponent(soil)}&terrainType=${encodeURIComponent(terrain)}&stage=${encodeURIComponent(stage)}`;
        
        const response = await fetch(`/api/detailed-manual?${query}`);
        const data = await response.json();
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').innerHTML = marked.parse(data.plan);
      } catch (err) {
        document.getElementById('loading').textContent = 'Error: Scientific Manual Generation Failed. Please try again.';
      }
    }
    loadPlan();
  </script>
</body>
</html>
